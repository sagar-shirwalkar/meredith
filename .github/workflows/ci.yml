name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.x"
      - run: uv sync --extra dev
      - run: uv run ruff check src/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.x"
      - run: uv sync --extra dev
      - run: uv run mypy src/ --strict

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.x"
      - run: uv sync --extra dev
      - run: uv run pytest tests/ -v --cov=coding_agent

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: github.event_name == 'release'
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.x"
      - run: uv build
      - run: uv publish
