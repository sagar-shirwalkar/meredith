# ──────────────────────────────────────────────────────────────
# Local-model overrides (Ollama on Linux/macOS/Windows, MLX on Apple Silicon)
# Merged on top of base.yaml.
# ──────────────────────────────────────────────────────────────

llm:
  provider: "local"
  model: "qwen3.5:9b-mlx"
  ollama_base: "http://localhost:11434"
  mlx_model_path: null # Set to local MLX model dir if using MLX directly
  temperature: 0.1 # Lower temp — local models need more guidance
  max_response_tokens: 2048
  streaming: true
  # Fallback: if Ollama is down, try MLX subprocess
  mlx_fallback: false
  # TurboQuant KV cache compression for Apple Silicon (M-series)
  # Enables running 27B-32B models on 24GB unified memory.
  # See .agents/skills/agentic-improvements/references/TURBOQUANT.md
  turboquant:
    enabled: false
    kv_bits: 3 # 3-bit KV cache (K8/V3 mixed precision)
    weight_bits: 4 # 4-bit weights
    sink_tokens: 128 # First N tokens kept at full precision
    layer_adaptive: true # Apply different bit widths per layer

agent:
  planner_type: "flat" # Local models struggle with tree-of-thought
  planner_model: null # Same model does planning
  verifier_concurrent: false # Don't run verifier concurrently — save compute
  max_steps: 30 # Shorter horizon to avoid context overflow

context:
  max_tokens: 32000 # 7-13B default; 96000 with TurboQuant enabled for 32B
  zones:
    immutable: { priority: 0, max_tokens: 2000 }
    task: { priority: 1, max_tokens: 1500 }
    working: { priority: 2, max_tokens: 6000 }
    episodic: { priority: 3, max_tokens: 2000 }
    semantic: { priority: 4, max_tokens: 1000 }
    scratch: { priority: 5, max_tokens: 500 }

tools:
  router:
    strategy: "rules_only" # Local models can't reliably choose tools via LLM
    learned_preferences: false
  fs:
    max_read_lines: 50 # Smaller reads to avoid context overflow
  search:
    max_results: 15
  web:
    backend: "brave" # Simplest API, good enough

rag:
  retrieval:
    top_k: 5 # Fewer chunks — less noise for smaller models
  chunk:
    max_lines: 40 # Smaller chunks
